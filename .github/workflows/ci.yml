name: CI

on:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # master へのPRはテスト失敗でブロック、それ以外は警告止まり
    continue-on-error: ${{ github.base_ref != 'master' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
